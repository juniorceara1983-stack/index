<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Agenda V3</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>📅 Agenda Inteligente</h1>

<div class="form">

<input id="title" placeholder="Título">

<input type="date" id="date">

<input type="time" id="start">

<input type="time" id="end">

<input id="location" placeholder="Local">

<textarea id="notes" placeholder="Notas"></textarea>

<button onclick="addEvent()">Salvar Evento</button>

</div>

<div id="calendar"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

<script src="app.js"></script>

</body>

</html>
