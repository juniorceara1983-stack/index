<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1e3a5f" />
  <title>Criar eventos para o calendário</title>

  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker registrado!'))
          .catch(err => console.error('Falha ao registrar SW', err));
      });
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --gold: #d4a853;
      --cream: #fefce8;
      --muted: #94a3b8;
      --ok: #22c55e;
      --bad: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(ellipse 100% 80% at 50% -20%, #1e3a5f 0%, var(--bg) 50%);
      font-family: "Source Sans 3", sans-serif;
      color: var(--cream);
      padding: 1rem;
      padding-bottom: 2rem;
    }
    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 700;
      font-size: clamp(1.35rem, 4vw, 1.85rem);
      text-align: center;
      margin: 0 0 0.35rem;
      color: var(--gold);
    }
    .sub {
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 36rem;
      margin: 0 auto 1.25rem;
      line-height: 1.45;
    }
    .panel {
      max-width: 520px;
      margin: 0 auto;
      background: var(--card);
      border-radius: 16px;
      padding: 1.25rem;
      border: 1px solid rgba(212, 168, 83, 0.25);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
    }
    .panel h2 {
      font-family: "Fraunces", serif;
      font-size: 1.05rem;
      color: var(--gold);
      margin: 0 0 0.75rem;
      font-weight: 600;
    }
    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    .field { margin-bottom: 0.85rem; }
    input[type="text"], input[type="date"], input[type="time"], textarea {
      width: 100%;
      font-family: inherit;
      font-size: 1rem;
      padding: 0.65rem 0.75rem;
      border-radius: 10px;
      border: 2px solid rgba(148, 163, 184, 0.35);
      background: rgba(15, 23, 42, 0.6);
      color: var(--cream);
    }
    textarea { min-height: 4rem; resize: vertical; }
    input:focus, textarea:focus { outline: none; border-color: var(--gold); }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    @media (max-width: 420px) { .row2 { grid-template-columns: 1fr; } }
    .check { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.85rem; cursor: pointer; font-size: 0.95rem; }
    .check input { width: 1.1rem; height: 1.1rem; accent-color: var(--gold); }
    .btns { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.25rem; }
    button { font-family: inherit; font-size: 1rem; font-weight: 600; padding: 0.75rem 1rem; border-radius: 12px; border: none; cursor: pointer; }
    .btn-primary { background: linear-gradient(180deg, #f59e0b 0%, #b45309 100%); color: #0f172a; box-shadow: 0 4px 0 #92400e; }
    .btn-primary:active { transform: translateY(2px); box-shadow: 0 2px 0 #92400e; }
    .btn-secondary { background: rgba(148, 163, 184, 0.2); color: var(--cream); border: 2px solid rgba(148, 163, 184, 0.35); }
    .btn-ok { background: linear-gradient(180deg, #4ade80 0%, #15803d 100%); color: #0f172a; box-shadow: 0 4px 0 #166534; }
    .btn-ok:active { transform: translateY(2px); }
    .hint { font-size: 0.82rem; color: var(--muted); margin-top: 0.75rem; line-height: 1.45; }
    .event-list { list-style: none; margin: 0; padding: 0; }
    .event-list li { background: rgba(15, 23, 42, 0.55); border: 1px solid rgba(148, 163, 184, 0.25); border-radius: 12px; padding: 0.75rem 0.85rem; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: flex-start; gap: 0.75rem; }
    .event-list li strong { display: block; color: var(--cream); font-size: 1rem; }
    .event-list li span { font-size: 0.88rem; color: var(--muted); }
    .event-actions { display: flex; flex-direction: column; gap: 0.35rem; flex-shrink: 0; }
    .event-actions button { padding: 0.35rem 0.55rem; font-size: 0.82rem; white-space: nowrap; }
    .btn-google-row { background: rgba(59, 130, 246, 0.25); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.45); }
    .btn-remove { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.4); }
    .empty { color: var(--muted); font-size: 0.92rem; font-style: italic; margin: 0; }
    .err { color: #fca5a5; font-size: 0.88rem; margin-top: 0.5rem; }
    .toast { position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid rgba(212, 168, 83, 0.5); padding: 0.75rem 1.1rem; border-radius: 12px; z-index: 9999; max-width: min(92vw, 26rem); box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45); font-size: 0.92rem; text-align: center; }
  </style>
</head>
<body>
  <h1>Eventos para o calendário</h1>
  <p class="sub">Preencha os dados e adicione à lista. O botão <strong>Google</strong> abrirá seu calendário oficial para salvar.</p>

  <div class="panel">
    <h2>Novo evento</h2>
    <div class="field">
      <label for="titulo">Título</label>
      <input type="text" id="titulo" placeholder="Ex.: Reunião de catequese" />
    </div>
    <div class="field">
      <label for="data">Data</label>
      <input type="date" id="data" />
    </div>
    <label class="check">
      <input type="checkbox" id="diaInteiro" />
      Dia inteiro (sem hora)
    </label>
    <div class="row2" id="horasRow">
      <div class="field">
        <label for="horaIni">Início</label>
        <input type="time" id="horaIni" />
      </div>
      <div class="field">
        <label for="horaFim">Fim</label>
        <input type="time" id="horaFim" />
      </div>
    </div>
    <div class="field">
      <label for="local">Local (opcional)</label>
      <input type="text" id="local" placeholder="Ex.: Paróquia" />
    </div>
    <div class="field">
      <label for="notas">Notas (opcional)</label>
      <textarea id="notas" placeholder="Detalhes…"></textarea>
    </div>
    <p class="err" id="formErr" hidden></p>
    <div class="btns">
      <button type="button" class="btn-primary" id="btnAdd">Adicionar à lista</button>
    </div>
  </div>

  <div class="panel" style="margin-top:1rem;">
    <h2>Lista (<span id="count">0</span>)</h2>
    <p class="empty" id="emptyMsg">Ainda não há eventos.</p>
    <ul class="event-list" id="lista" hidden></ul>
    <div class="btns" style="margin-top:1rem;">
      <button type="button" class="btn-ok" id="btnDownload" disabled>arquivo .ics</button>
      <button type="button" class="btn-secondary" id="btnDownloadTxt" disabled>baixar texto</button>
      <button type="button" class="btn-secondary" id="btnClear">Limpar lista</button>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script>
    (function () {
      const events = [];
      const el = (id) => document.getElementById(id);
      
      // Funções de UI
      const showToast = (msg) => {
        const t = el("toast");
        t.textContent = msg;
        t.hidden = false;
        setTimeout(() => t.hidden = true, 3000);
      };

      // Formatar data hoje
      el("data").value = new Date().toISOString().split('T')[0];
      el("horaIni").value = "10:00";
      el("horaFim").value = "11:00";

      // Esconder horas se for dia inteiro
      el("diaInteiro").addEventListener("change", (e) => {
        el("horasRow").style.display = e.target.checked ? "none" : "grid";
      });

      // Gerar link do Google Calendar (Fallback seguro)
      function getGoogleUrl(ev) {
        const start = ev.diaInteiro ? ev.data.replace(/-/g, '') : ev.data.replace(/-/g, '') + 'T' + ev.horaIni.replace(':', '') + '00';
        const end = ev.diaInteiro ? ev.data.replace(/-/g, '') : ev.data.replace(/-/g, '') + 'T' + ev.horaFim.replace(':', '') + '00';
        return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(ev.titulo)}&dates=${start}/${end}&details=${encodeURIComponent(ev.notas)}&location=${encodeURIComponent(ev.local)}`;
      }

      function render() {
        const listEl = el("lista");
        const emptyEl = el("emptyMsg");
        const countEl = el("count");
        
        countEl.textContent = events.length;
        if (events.length === 0) {
          listEl.hidden = true;
          emptyEl.hidden = false;
          el("btnDownload").disabled = el("btnDownloadTxt").disabled = true;
          return;
        }

        listEl.hidden = false;
        emptyEl.hidden = true;
        el("btnDownload").disabled = el("btnDownloadTxt").disabled = false;
        listEl.innerHTML = "";

        events.forEach((ev, index) => {
          const li = document.createElement("li");
          li.innerHTML = `
            <div>
              <strong>${ev.titulo}</strong>
              <span>${ev.data} ${ev.diaInteiro ? '(Dia Todo)' : '· ' + ev.horaIni}</span>
            </div>
            <div class="event-actions">
              <button class="btn-google-row" onclick="window.open('${getGoogleUrl(ev)}', '_blank')">Google</button>
              <button class="btn-remove" data-index="${index}">Remover</button>
            </div>
          `;
          listEl.appendChild(li);
        });

        document.querySelectorAll(".btn-remove").forEach(btn => {
          btn.onclick = (e) => {
            events.splice(e.target.dataset.index, 1);
            render();
          };
        });
      }

      el("btnAdd").onclick = () => {
        const titulo = el("titulo").value.trim();
        if (!titulo) return showToast("Digite um título!");

        events.push({
          titulo,
          data: el("data").value,
          diaInteiro: el("diaInteiro").checked,
          horaIni: el("horaIni").value,
          horaFim: el("horaFim").value,
          local: el("local").value,
          notas: el("notas").value
        });

        el("titulo").value = "";
        el("notas").value = "";
        render();
        showToast("Adicionado!");
      };

      el("btnClear").onclick = () => {
        if(confirm("Limpar lista?")) { events.length = 0; render(); }
      };

      // Download ICS simples
      el("btnDownload").onclick = () => {
        let ics = "BEGIN:VCALENDAR\nVERSION:2.0\n";
        events.forEach(ev => {
          ics += `BEGIN:VEVENT\nSUMMARY:${ev.titulo}\nDTSTART:${ev.data.replace(/-/g,'')}T090000\nEND:VEVENT\n`;
        });
        ics += "END:VCALENDAR";
        const blob = new Blob([ics], {type: "text/calendar"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "eventos.ics";
        a.click();
      };
    })();
  </script>
</body>
</html>
