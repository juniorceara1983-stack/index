<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1e3a5f" />
  <title>Gestor de Eventos Pro</title>

  <link rel="manifest" href="manifest-eventos.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw-eventos.js');
  }
</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0f172a; --card: #1e293b; --gold: #d4a853; --cream: #fefce8;
      --muted: #94a3b8; --ok: #22c55e; --primary: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: radial-gradient(ellipse 100% 80% at 50% -20%, #1e3a5f 0%, var(--bg) 50%);
      font-family: "Source Sans 3", sans-serif; color: var(--cream); padding: 1rem;
    }
    h1, h2 { font-family: "Fraunces", serif; color: var(--gold); text-align: center; margin-bottom: 0.5rem; }
    .panel {
      max-width: 550px; margin: 0 auto 1rem; background: var(--card);
      border-radius: 16px; padding: 1.25rem; border: 1px solid rgba(212, 168, 83, 0.2);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.3);
    }
    .field { margin-bottom: 0.8rem; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted); margin-bottom: 0.3rem; }
    input, textarea {
      width: 100%; padding: 0.6rem; border-radius: 8px; border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(15, 23, 42, 0.5); color: var(--cream); font-family: inherit;
    }
    .btns { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    button { font-weight: 600; padding: 0.7rem; border-radius: 10px; border: none; cursor: pointer; transition: 0.2s; }
    .btn-primary { background: linear-gradient(180deg, #f59e0b, #b45309); color: #0f172a; width: 100%; }
    .btn-share { background: linear-gradient(180deg, #4ade80, #15803d); color: #0f172a; width: 100%; }
    .btn-secondary { background: rgba(148, 163, 184, 0.1); color: var(--cream); border: 1px solid rgba(148, 163, 184, 0.2); flex: 1; }
    
    .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
    .cal-day { padding: 8px 0; font-size: 0.8rem; border-radius: 6px; background: rgba(255,255,255,0.03); }
    .has-event { background: var(--gold); color: var(--bg); font-weight: bold; }
    
    .event-item { background: rgba(15,23,42,0.4); border-radius: 12px; padding: 12px; margin-bottom: 10px; border-left: 4px solid var(--gold); }
    .batch-row { background: rgba(255,255,255,0.02); border-radius: 10px; padding: 8px; }
    .event-header { display: flex; align-items: flex-start; gap: 10px; }
    .event-actions { display: flex; gap: 8px; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px; }
    .btn-mini { font-size: 0.7rem; padding: 4px 8px; background: rgba(59, 130, 246, 0.2); color: #93c5fd; border: 1px solid #3b82f6; }
    
    #previewModal { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 1rem;
    }
    .modal-content { background: var(--card); border: 2px solid var(--gold); border-radius: 16px; padding: 1.5rem; max-width: 450px; width: 100%; }
    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; border: 1px solid var(--gold); padding: 10px 20px; border-radius: 50px; display: none; z-index: 4000; }
  </style>
</head>
<body>

  <h1>Minha Agenda</h1>

  <div class="panel">
    <div class="field"><label>Título</label><input type="text" id="titulo" placeholder="Ex: Farm Boss" /></div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <div class="field"><label>Data</label><input type="date" id="data" /></div>
      <div class="field"><label>Hora</label><input type="time" id="hora" /></div>
    </div>
    <div class="field"><label>Descrição</label><textarea id="desc" rows="2" placeholder="Detalhes..."></textarea></div>
    <button class="btn-primary" id="btnAdd">Salvar Evento</button>
  </div>

  <div class="panel">
    <div class="cal-nav">
      <button class="btn-secondary" onclick="changeMonth(-1)">❮</button>
      <div id="calMonth" style="font-weight: bold; color: var(--gold)"></div>
      <button class="btn-secondary" onclick="changeMonth(1)">❯</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="panel">
    <h2>Próximos Eventos</h2>
    <div id="lista"></div>
    <div class="btns" style="margin-top:15px;">
      <button class="btn-share" id="btnPreview" disabled>Visualizar e Enviar Zap</button>
      <button class="btn-secondary" id="btnClear">Limpar Tudo</button>
    </div>
  </div>

  <div class="panel">
    <h2>📋 Criar Vários Eventos</h2>
    <div id="batchWrap"></div>
    <div class="btns" style="margin-top:10px;">
      <button class="btn-secondary" id="btnBatchAdd">+ Adicionar Data</button>
      <button class="btn-primary" id="btnBatchSave" style="flex:2">💾 Salvar Todos</button>
      <button class="btn-share" id="btnBatchSendWap" style="flex:2">📲 Enviar Lote no Zap</button>
    </div>
  </div>

  <div id="previewModal"> 
    <div class="modal-content">
      <h3 style="color:var(--gold); margin-top:0;">Resumo da Agenda</h3>
      <div id="previewText" style="white-space: pre-wrap; background:#0f172a; padding:12px; border-radius:10px; font-size:0.9rem; margin-bottom:15px; border: 1px solid rgba(255,255,255,0.1); max-height: 250px; overflow-y: auto;"></div>
      <div class="btns">
        <button class="btn-share" id="btnConfirmSend">📲 Enviar no WhatsApp</button>
        <button class="btn-secondary" id="btnCloseModal">Voltar</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    (function () {
      let events = JSON.parse(localStorage.getItem('agenda_v4')) || [];
      let currentCalDate = new Date();
      const el = (id) => document.getElementById(id);

      /* ── Frases bíblicas e de santos ── */
      const frases = [
        '🙏 "Tudo posso naquele que me fortalece." — Fp 4:13',
        '✝️ "O Senhor é meu pastor e nada me faltará." — Sl 23:1',
        '🕊️ "Buscai primeiro o Reino de Deus e a sua justiça." — Mt 6:33',
        '💫 "Confiai no Senhor de todo o coração." — Pv 3:5',
        '⭐ "O amor é paciente, o amor é bondoso." — 1 Co 13:4',
        '🕯️ "A tua palavra é lâmpada para meus pés." — Sl 119:105',
        '🌿 "Lançai sobre ele toda a vossa ansiedade, porque ele tem cuidado de vós." — 1 Pe 5:7',
        '🌸 "A fé é a certeza daquilo que esperamos." — Hb 11:1',
        '🌟 "Pedi e recebereis, buscai e encontrareis." — Mt 7:7',
        '🌺 "Porque Deus amou o mundo de tal maneira que deu o seu Filho." — Jo 3:16',
        '🌹 "Deixa Deus agir e ele fará tudo por ti." — Santa Teresa de Ávila',
        '☀️ "Começa fazendo o necessário, depois o possível, e de repente estarás fazendo o impossível." — São Francisco de Assis',
        '🕊️ "A paz começa com um sorriso." — Santa Teresa de Calcutá',
        '⚓ "Deus nunca nos dá uma cruz que não possamos carregar." — Santo Agostinho',
        '🌷 "A oração é o oxigênio da alma." — São Padre Pio',
        '💛 "Trabalha como se tudo dependesse de ti, ora como se tudo dependesse de Deus." — Santo Inácio de Loyola',
        '🌠 "Sede sábios como as serpentes e simples como as pombas." — Mt 10:16',
        '🔥 "Não vim trazer paz, mas a espada da verdade que liberta." — São João da Cruz',
        '🌙 "Tudo tem o seu tempo determinado, há tempo para todo propósito debaixo do céu." — Ecl 3:1',
        '💎 "O Senhor te abençoe e te guarde. O Senhor faça brilhar o seu rosto sobre ti." — Nm 6:24-25'
      ];

      function getRandomFrase() { return frases[Math.floor(Math.random() * frases.length)]; }

      function showToast(m) { el("toast").innerText = m; el("toast").style.display = "block"; setTimeout(() => el("toast").style.display = "none", 3000); }
      function normalizeTitle(title) { return String(title || "").trim(); }
      function formatDateOnly(d) {
        return `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}`;
      }
      function formatDateTime(d) {
        return `${formatDateOnly(d)}T${String(d.getHours()).padStart(2, '0')}${String(d.getMinutes()).padStart(2, '0')}00`;
      }
      function getGoogleCalendarLink(ev) {
        if (!ev?.data) return "";
        const parts = ev.data.split('-').map(Number);
        if (parts.length !== 3 || parts.some(Number.isNaN)) return "";
        const [ano, mes, dia] = parts;
        const titulo = normalizeTitle(ev.titulo) || "Evento";
        const hasHora = !!ev.hora;
        let start;
        let end;
        if (hasHora) {
          const horaMatch = /^([01]\d|2[0-3]):([0-5]\d)$/.exec(ev.hora);
          if (!horaMatch) return "";
          const h = Number(horaMatch[1]);
          const m = Number(horaMatch[2]);
          start = new Date(ano, mes - 1, dia, h, m, 0);
          end = new Date(start.getTime() + 60 * 60 * 1000);
        } else {
          start = new Date(ano, mes - 1, dia);
          end = new Date(start);
          end.setDate(end.getDate() + 1);
        }
        const dates = hasHora
          ? `${formatDateTime(start)}/${formatDateTime(end)}`
          : `${formatDateOnly(start)}/${formatDateOnly(end)}`;
        const params = new URLSearchParams({
          action: 'TEMPLATE',
          text: titulo,
          dates
        });
        if (ev.desc) params.set('details', ev.desc);
        return `https://calendar.google.com/calendar/render?${params.toString()}`;
      }

      function save() { localStorage.setItem('agenda_v4', JSON.stringify(events)); render(); renderCalendar(); }

      window.changeMonth = (n) => { currentCalDate.setMonth(currentCalDate.getMonth() + n); renderCalendar(); };

      function renderCalendar() {
        const grid = el("calGrid"); grid.innerHTML = "";
        const m = currentCalDate.getMonth(); const y = currentCalDate.getFullYear();
        el("calMonth").innerText = new Intl.DateTimeFormat('pt-BR', {month:'long', year:'numeric'}).format(currentCalDate).toUpperCase();
        const daysInMonth = new Date(y, m + 1, 0).getDate();
        for (let i = 1; i <= daysInMonth; i++) {
          const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
          const hasEv = events.some(e => e.data === dStr);
          const day = document.createElement("div");
          day.className = "cal-day" + (hasEv ? " has-event" : "");
          day.innerText = i; grid.appendChild(day);
        }
      }

      function render() {
        const listEl = el("lista"); listEl.innerHTML = events.length ? "" : "<p style='color:var(--muted); text-align:center'>Lista vazia.</p>";
        el("btnPreview").disabled = events.length === 0;
        events.forEach((ev, i) => {
          const title = normalizeTitle(ev.titulo);
          const div = document.createElement("div"); div.className = "event-item";
          div.innerHTML = `<div class="event-header"><input type="checkbox" class="send-check" data-index="${i}" checked style="width:20px;height:20px;"><div style="flex:1"><strong>${title}</strong><br><small>${ev.data} às ${ev.hora || '--:--'}</small>${ev.desc ? `<br><small style="color:var(--muted)">${ev.desc}</small>` : ''}</div></div>
            <div class="event-actions"><button class="btn-mini" style="border-color:#fca5a5;color:#fca5a5;background:none" onclick="removeEv(${i})">Excluir</button></div>`;
          listEl.appendChild(div);
        });
      }

      el("btnPreview").onclick = async () => {
        const selected = document.querySelectorAll(".send-check:checked");
        if (!selected.length) return alert("Selecione pelo menos um evento!");
        el("btnPreview").disabled = true;
        el("btnPreview").innerText = "⏳ Preparando...";
        try {
          const selectedEvents = [...selected].map(chk => events[chk.dataset.index]);
          const frase = getRandomFrase();
          const dataHoje = new Date().toLocaleDateString('pt-BR');
          let txt = `✨ *AGENDA DE COMPROMISSOS* ✨\n📆 Gerada em: ${dataHoje}\n\n`;
          for (const ev of selectedEvents) {
            const [ano, mes, dia] = ev.data.split('-');
            txt += `🔔 *${normalizeTitle(ev.titulo)}*\n`;
            txt += `📅 ${dia}/${mes}/${ano}`;
            txt += ev.hora ? ` às ${ev.hora}` : '';
            txt += `\n`;
            if (ev.desc) txt += `📝 ${ev.desc}\n`;
            txt += `\n`;
          }
          if (selectedEvents.length === 1) {
            const googleCalendarLink = getGoogleCalendarLink(selectedEvents[0]);
            if (googleCalendarLink) txt += `📎 Google Agenda: ${googleCalendarLink}\n\n`;
          }
          txt += `───────────────\n${frase}`;
          el("previewText").innerText = txt;
          el("previewModal").style.display = "flex";
        } finally {
          el("btnPreview").disabled = false;
          el("btnPreview").innerText = "Visualizar e Enviar Zap";
        }
      };

      el("btnConfirmSend").onclick = () => {
        const t = el("previewText").innerText;
        if (navigator.share) {
          navigator.share({ text: t })
            .then(() => el("previewModal").style.display = "none")
            .catch(() => {
              window.open(`https://wa.me/?text=${encodeURIComponent(t)}`, '_blank');
              el("previewModal").style.display = "none";
            });
        } else {
          window.open(`https://wa.me/?text=${encodeURIComponent(t)}`, '_blank');
          el("previewModal").style.display = "none";
        }
      };

      el("btnCloseModal").onclick = () => el("previewModal").style.display = "none";
      window.removeEv = (i) => { if (confirm("Remover este evento?")) { events.splice(i, 1); save(); } };

      /* ── Adicionar evento único ── */
      el("btnAdd").onclick = () => {
        const titulo = normalizeTitle(el("titulo").value);
        if (!titulo || !el("data").value) return showToast("Informe Título e Data!");
        events.push({ titulo, data: el("data").value, hora: el("hora").value, desc: el("desc").value });
        el("titulo").value = ""; el("desc").value = "";
        save(); showToast("Evento salvo! ✅");
      };

      /* ── Lote: múltiplos eventos ── */
      function emptyBatchRow() { return { data: new Date().toISOString().split('T')[0], hora: '', titulo: '', desc: '' }; }
      window.batchRows = [emptyBatchRow()];

      function renderBatch() {
        const wrap = el("batchWrap"); wrap.innerHTML = "";
        batchRows.forEach((row, idx) => {
          const d = document.createElement("div");
          d.className = "batch-row";
          d.innerHTML = `
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px;">
              <div class="field"><label>Título ${idx + 1}</label><input type="text" placeholder="Título" value="${row.titulo}" oninput="window.batchRows[${idx}].titulo=this.value"/></div>
              <div class="field"><label>Data</label><input type="date" value="${row.data}" oninput="window.batchRows[${idx}].data=this.value"/></div>
              <div class="field"><label>Hora</label><input type="time" value="${row.hora}" oninput="window.batchRows[${idx}].hora=this.value"/></div>
              <div class="field"><label>Descrição</label><input type="text" placeholder="Opcional" value="${row.desc}" oninput="window.batchRows[${idx}].desc=this.value"/></div>
            </div>
            ${window.batchRows.length > 1 ? `<button class="btn-mini" style="border-color:#fca5a5;color:#fca5a5;background:none;margin-bottom:8px" onclick="removeBatchRow(${idx})">✕ Remover</button>` : ''}
            <hr style="border-color:rgba(255,255,255,0.08);margin:4px 0 10px"/>`;
          wrap.appendChild(d);
        });
      }

      window.removeBatchRow = (idx) => { window.batchRows.splice(idx, 1); renderBatch(); };

      el("btnBatchAdd").onclick = () => {
        window.batchRows.push(emptyBatchRow());
        renderBatch();
      };

      el("btnBatchSave").onclick = () => {
        const valid = window.batchRows.filter(r => r.titulo.trim() && r.data);
        if (!valid.length) return showToast("Preencha ao menos título e data!");
        valid.forEach(r => events.push({ titulo: normalizeTitle(r.titulo), data: r.data, hora: r.hora, desc: r.desc }));
        window.batchRows = [emptyBatchRow()];
        renderBatch();
        save(); showToast(`${valid.length} evento(s) salvo(s)! ✅`);
      };

      el("btnBatchSendWap").onclick = async () => {
        const valid = window.batchRows.filter(r => r.titulo.trim() && r.data);
        if (!valid.length) return showToast("Preencha ao menos título e data!");
        el("btnBatchSendWap").disabled = true;
        el("btnBatchSendWap").innerText = "⏳ Preparando...";
        try {
          const validEvents = valid.map(r => ({ titulo: normalizeTitle(r.titulo), data: r.data, hora: r.hora, desc: r.desc }));
          const frase = getRandomFrase();
          const dataHoje = new Date().toLocaleDateString('pt-BR');
          let txt = `✨ *AGENDA DE COMPROMISSOS* ✨\n📆 Gerada em: ${dataHoje}\n\n`;
          for (const ev of validEvents) {
            const [ano, mes, dia] = ev.data.split('-');
            txt += `🔔 *${ev.titulo}*\n`;
            txt += `📅 ${dia}/${mes}/${ano}`;
            txt += ev.hora ? ` às ${ev.hora}` : '';
            txt += `\n`;
            if (ev.desc) txt += `📝 ${ev.desc}\n`;
            txt += `\n`;
          }
          if (validEvents.length === 1) {
            const googleCalendarLink = getGoogleCalendarLink(validEvents[0]);
            if (googleCalendarLink) txt += `📎 Google Agenda: ${googleCalendarLink}\n\n`;
          }
          txt += `───────────────\n${frase}`;
          window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`, '_blank');
        } finally {
          el("btnBatchSendWap").disabled = false;
          el("btnBatchSendWap").innerText = "📲 Enviar Lote no Zap";
        }
      };

      el("btnClear").onclick = () => { if (confirm("Limpar todos os eventos?")) { events = []; save(); } };
      el("data").value = new Date().toISOString().split('T')[0];
      renderBatch();
      save();
    })();
  </script>
</body>
</html>
