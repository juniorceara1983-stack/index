<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1e3a5f" />
  <title>Gestor de Eventos</title>

  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0f172a; --card: #1e293b; --gold: #d4a853; --cream: #fefce8;
      --muted: #94a3b8; --ok: #22c55e; --primary: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: radial-gradient(ellipse 100% 80% at 50% -20%, #1e3a5f 0%, var(--bg) 50%);
      font-family: "Source Sans 3", sans-serif; color: var(--cream);
      padding: 1rem; padding-bottom: 2rem;
    }
    h1 { font-family: "Fraunces", serif; color: var(--gold); text-align: center; margin-bottom: 0.5rem; }
    .panel {
      max-width: 520px; margin: 0 auto 1rem; background: var(--card);
      border-radius: 16px; padding: 1.25rem; border: 1px solid rgba(212, 168, 83, 0.25);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
    }
    .field { margin-bottom: 0.85rem; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 0.35rem; }
    input, textarea {
      width: 100%; padding: 0.65rem; border-radius: 10px; border: 2px solid rgba(148, 163, 184, 0.2);
      background: rgba(15, 23, 42, 0.6); color: var(--cream); font-family: inherit;
    }
    .btns { display: flex; flex-wrap: wrap; gap: 0.6rem; }
    button { 
      font-weight: 600; padding: 0.8rem; border-radius: 12px; border: none; cursor: pointer; transition: 0.2s;
    }
    .btn-primary { background: linear-gradient(180deg, #f59e0b, #b45309); color: #0f172a; width: 100%; }
    .btn-share { background: linear-gradient(180deg, #4ade80, #15803d); color: #0f172a; width: 100%; }
    .btn-secondary { background: rgba(148, 163, 184, 0.1); color: var(--cream); border: 1px solid rgba(148, 163, 184, 0.3); flex: 1; }
    
    /* Calendário Mini */
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 10px; text-align: center; }
    .cal-day { padding: 8px 2px; font-size: 0.75rem; border-radius: 6px; background: rgba(255,255,255,0.05); }
    .has-event { background: var(--gold); color: var(--bg); font-weight: bold; box-shadow: 0 0 8px var(--gold); }
    
    /* Modal de Preview */
    #previewArea { 
      background: #0f172a; border: 1px solid var(--gold); padding: 10px; 
      border-radius: 8px; margin-top: 10px; display: none;
    }
    .event-list-item { background: rgba(15,23,42,0.5); border-radius: 10px; padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>

  <h1>Meus Agendamentos</h1>

  <div class="panel">
    <div class="field">
      <label>Título do Evento</label>
      <input type="text" id="titulo" placeholder="Ex: Farm Boss / Reunião" />
    </div>
    <div class="field">
      <label>Data</label>
      <input type="date" id="data" />
    </div>
    <div class="btns">
      <button class="btn-primary" id="btnAdd">Agendar Evento</button>
    </div>
  </div>

  <div class="panel">
    <h2>Calendário Mensal</h2>
    <div id="calHeader" style="text-align:center; margin-bottom:10px; font-weight:bold; color:var(--gold)"></div>
    <div class="cal-grid" id="calContainer"></div>
  </div>

  <div class="panel">
    <h2>Lista de Eventos (<span id="count">0</span>)</h2>
    <ul id="lista" style="list-style:none; padding:0;"></ul>
    
    <div class="btns" style="margin-top:1rem; flex-direction: column;">
      <button class="btn-share" id="btnShowPreview" disabled>Visualizar e Compartilhar</button>
      
      <div id="previewArea">
        <label>Edite o texto se desejar:</label>
        <textarea id="textPreview" style="height: 150px; font-size: 0.9rem; margin-bottom: 10px;"></textarea>
        <button class="btn-primary" id="btnFinalShare" style="background: var(--ok); color: white;">Enviar Agora</button>
      </div>

      <div style="display: flex; gap: 8px; width: 100%; margin-top: 8px;">
        <button class="btn-secondary" id="btnDownloadTxt" disabled>Salvar .txt</button>
        <button class="btn-secondary" id="btnClear">Limpar Tudo</button>
      </div>
    </div>
  </div>

  <div id="toast" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--card); padding:10px 20px; border-radius:20px; border:1px solid var(--gold); display:none; z-index:100;"></div>

  <script>
    (function () {
      let events = JSON.parse(localStorage.getItem('meus_eventos_l2')) || [];
      const el = (id) => document.getElementById(id);

      const showToast = (m) => { el("toast").innerText = m; el("toast").style.display = "block"; setTimeout(()=>el("toast").style.display="none", 2000); };

      function save() { 
        localStorage.setItem('meus_eventos_l2', JSON.stringify(events));
        render(); 
        renderCalendar();
      }

      function renderCalendar() {
        const container = el("calContainer");
        const header = el("calHeader");
        container.innerHTML = "";
        const now = new Date();
        header.innerText = now.toLocaleString('pt-BR', { month: 'long', year: 'numeric' }).toUpperCase();
        
        const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        
        for (let i = 1; i <= daysInMonth; i++) {
          const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
          const hasEv = events.some(e => e.data === dateStr);
          const dayEl = document.createElement("div");
          dayEl.className = "cal-day" + (hasEv ? " has-event" : "");
          dayEl.innerText = i;
          container.appendChild(dayEl);
        }
      }

      function render() {
        const listEl = el("lista");
        el("count").innerText = events.length;
        listEl.innerHTML = "";
        
        el("btnShowPreview").disabled = el("btnDownloadTxt").disabled = (events.length === 0);

        events.forEach((ev, i) => {
          const li = document.createElement("li");
          li.className = "event-list-item";
          li.innerHTML = `<div><strong>${ev.titulo}</strong><br><small>${ev.data}</small></div>
                          <button style="background:none; color:#fca5a5; border:1px solid #fca5a5; padding:5px; border-radius:5px" onclick="removeEv(${i})">X</button>`;
          listEl.appendChild(li);
        });
      }

      window.removeEv = (i) => { events.splice(i, 1); save(); };

      el("btnAdd").onclick = () => {
        const t = el("titulo").value;
        const d = el("data").value;
        if(!t || !d) return showToast("Preencha título e data!");
        events.push({ titulo: t, data: d });
        el("titulo").value = "";
        save();
        showToast("Agendado!");
      };

      // LOGICA DE PREVIEW
      el("btnShowPreview").onclick = () => {
        let txt = "*📅 MEUS AGENDAMENTOS:*\n\n";
        events.forEach(e => txt += `✅ ${e.titulo} - ${e.data}\n`);
        el("textPreview").value = txt;
        el("previewArea").style.display = "block";
      };

      el("btnFinalShare").onclick = () => {
        const finalTxt = el("textPreview").value;
        if (navigator.share) {
          navigator.share({ text: finalTxt });
        } else {
          navigator.clipboard.writeText(finalTxt);
          showToast("Copiado para o WhatsApp!");
        }
      };

      el("btnDownloadTxt").onclick = () => {
        const content = el("textPreview").value || "Lista Vazia";
        const blob = new Blob([content], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'agenda.txt';
        a.click();
      };

      el("btnClear").onclick = () => { if(confirm("Limpar tudo?")) { events = []; save(); el("previewArea").style.display = "none"; } };

      el("data").value = new Date().toISOString().split('T')[0];
      render();
      renderCalendar();
    })();
  </script>
</body>
</html>
